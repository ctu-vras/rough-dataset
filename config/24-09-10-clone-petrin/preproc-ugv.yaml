out_format: '{bag_base}.preproc{ext}'
compression: lz4
filters:
  - MergeInitialStaticTf:
      add_tags: [ "copied_tf" ]
  - CopyFirstTfToBagStart:
      add_tags: [ "copied_tf" ]
  - RemovePasswordsFromParams: {}
  # Make sure we have TFs also for images that have stamps slightly before the start of the bag
  - FixHeader:
      include_tags: [ "copied_tf" ]
      stamp_offset: -5.0
  - FixHeader:
      include_topics:
        - /camera_front/camera_info
        - /camera_front/image_color/compressed
      frame_id: pylon_camera_front
  - FixHeader:
      include_topics:
        - /camera_left/camera_info
        - /camera_left/image_color/compressed
      frame_id: pylon_camera_left
  - FixHeader:
      include_topics:
        - /camera_rear/camera_info
        - /camera_rear/image_color/compressed
      frame_id: pylon_camera_rear
  - FixHeader:
      include_topics:
        - /camera_right/camera_info
        - /camera_right/image_color/compressed
      frame_id: pylon_camera_right
  - FixHeader:
      include_topics:
        - /camera_up/camera_info
        - /camera_up/image_color/compressed
      frame_id: pylon_camera_up
  - RecomputeStaticTFFromRobotModel:
      description_file: "{dirname}/clone.urdf"
      add_tags: [ "recomputed" ]
  - UpdateParams:
      update:
        parts_config: &parts_config
          has_top_box_lora_ant: False
          has_top_box_l_wifi_ant: False
          has_top_box_r_wifi_ant: False
          has_rollcage: True
          gps_antenna_setup: 'rev1'
          gps_antenna_height: 0.4
          top_box_j_x: 0.514
        dynamic_robot_model_server:
          <<: *parts_config
          dgps_aux_antenna_pos_x: 0.57
          dgps_aux_antenna_pos_y: 0.1215
          dgps_aux_antenna_pos_z: 0.35
          dgps_main_antenna_pos_x: 0.03
          dgps_main_antenna_pos_y: 0.02
          dgps_main_antenna_pos_z: 0.4
        calibrated_joints:
          dgps_aux_antenna: [ 0.57, 0.1215, 0.37, 0.0, 0.0, 0.0, rear_right_box, dgps_aux_antenna ]
          dgps_main_antenna: [ 0.03, 0.02, 0.4, 0.0, 0.0, 0.0, rear_right_box, dgps_main_antenna ]
          ouster_holder: [ 0.04, 0.0, 0.005, 0.0, 0.0, 0.0, omnicam_top, ouster_holder ]
        omnicam_sensors_calib:
          transforms:
            - [ 0.63, 0.1215, 0.02, 0.0, 0.0, 0.0, 1.0, rear_right_box, camera_front ]
            - [ 0.31, 0.01, 0.02, 0.0, 0.0, 0.7071, -0.7071, rear_right_box, camera_right ]
            - [ 0.02, 0.1215, 0.02, 0.0, 0.0, 1.0, 0.0, rear_right_box, camera_rear ]
            - [ 0.31, 0.233, 0.02, 0.0, 0.0, 0.7071, 0.7071, rear_right_box, camera_left ]
            - [ 0.43, 0.1215, 0.24, 0.0, 0.7071, 0.0, -0.7071, rear_right_box, camera_up ]
  - UpdateRobotModel:
      urdf_file: "{dirname}/clone.urdf"
      param: nifti_robot_description
  - UpdateRobotModel:
      urdf_file: "{dirname}/clone.urdf"
      param: robot_description
  - UpdateRobotModel:
      urdf_file: "{dirname}/clone.urdf"
      param: nifti_tf_publisher/robot_description
  - UpdateRobotModel:
      urdf_file: "{dirname}/clone.urdf"
      param: dynamic_robot_model_server/robot_description
  - Remap:
      "/points_filtered_kontron": "/points_filtered"
  - Topics:
      exclude_topics:
        - /robot_bounding_box_debug
        - /robot_bounding_sphere_debug
        - /robot_model_for_bounding_box
        - /robot_model_for_bounding_sphere
        - /rosout
        - /rosout_agg
  - MagnetometerGaussToTesla:
      scale_covariance: False
      include_topics:
        - imu/mag
        - imu/mag_bias
        - imu/mag_unbiased
  - AddStaticTF:
      transforms:
      - frame_id: base_link
        child_frame_id: base_footprint
        transform: [0.0, 0.0, -0.07, 0.0, 0.0, 0.0]
  - RemoveInvalidTF: { }
  - DeduplicateTF: { }
